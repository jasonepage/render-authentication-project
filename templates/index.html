<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">
                <div class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>
                </div>
                <h1>Auth Chat</h1>
            </div>
            <nav>
                <a href="/demo" class="btn-secondary action-button">Demo</a>
                <a href="/map" class="btn-secondary action-button">Map</a>
                <a href="/info" class="btn-secondary action-button">Info</a>
            </nav>
        </header>

        <div id="auth-status" class="auth-section">
            <p>Checking authentication status...</p>
        </div>

        <div id="auth-modal" class="modal" style="display: none;">
            <div class="modal-content">
                <p id="modal-text">Please follow your security key's instructions...</p>
                <div class="spinner"></div>
            </div>
        </div>

        <div class="chat-section">
            <div class="public-chat-container">
                <h2>Public</h2>
                <p class="chat-description">Open channel. Authenticate with a security key to send messages.</p>
                <div id="public-messages" class="messages-container"></div>
                <div class="chat-input-container">
                    <input type="text" id="public-message-input" placeholder="Authenticate to send..." autocomplete="off">
                    <button id="public-send-button">Send</button>
                </div>
            </div>

            <div id="private-chat-container" class="private-chat-container" style="display: none;">
                <h2>Private</h2>
                <p class="chat-description">Secure channel for verified members.</p>
                <div id="private-messages" class="messages-container"></div>
                <div class="chat-input-container">
                    <input type="text" id="private-message-input" placeholder="Send a secure message..." autocomplete="off">
                    <button id="private-send-button">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script src="webauthn.js"></script>
    <script src="publicchat.js"></script>
    <script src="privatechat.js"></script>
</body>
</html>
